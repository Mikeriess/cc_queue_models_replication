<h1>Study 3 — Resultatudforskning</h1>
<p class="subtitle">Interaktiv udforskning af simuleringsresultater: NPS vs LRTF vs FCFS</p>

<div class="controls">
  <div class="control-group">
    <label>Metrik:</label>
    <select id="selMetric" onchange="update()">
      <option value="avg_individual_nps">Individual NPS</option>
      <option value="organisation_nps">Organisation NPS</option>
      <option value="avg_case_resolution_time_days">Resolution time (dage)</option>
      <option value="avg_waiting_time_days">Ventetid (dage)</option>
    </select>
  </div>
  <div class="control-group">
    <label>Sampling:</label>
    <select id="selSampling" onchange="update()">
      <option value="hard">hard</option>
      <option value="soft">soft</option>
    </select>
  </div>
  <div class="control-group">
    <label>Agenter:</label>
    <select id="selAgents" onchange="update()">
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
    </select>
  </div>
</div>

<div class="toggle-row">

</div>

<canvas id="plotCanvas" width="700" height="400"></canvas>

<div id="dataTable"></div>

const DISC_COLORS = { FCFS: '#ff7f0e', LRTF: '#2ca02c', NPS: '#d62728' };
const RHOS = [0.0, 0.22, 0.5, 0.85, 1.0];
const DISCIPLINES = ['FCFS', 'LRTF', 'NPS'];

const METRIC_LABELS = {
  'avg_individual_nps': 'Individual NPS (gns.)',
  'organisation_nps': 'Organisation NPS',
  'avg_case_resolution_time_days': 'Resolution time (dage)',
  'avg_waiting_time_days': 'Ventetid (dage)'
};

function getData(metric, sampling, nAgents) {
  const result = {};
  for (const d of DISCIPLINES) {
    result[d] = [];
    for (const rho of RHOS) {
      const row = DATA.find(r =>
        Math.abs(r.rho - rho) < 0.01 &&
        r.sampling_mode === sampling &&
        r.discipline === d &&
        r.n_agents === nAgents
      );
      if (row) {
        result[d].push({
          rho,
          mean: row[metric + '_mean'],
          ci: row[metric + '_ci95']
        });
      }
    }
  }
  return result;
}

function update() {
  const metric = document.getElementById('selMetric').value;
  const sampling = document.getElementById('selSampling').value;
  const nAgents = parseInt(document.getElementById('selAgents').value);
  const showDiff = document.getElementById('chkDiff').checked;

  const data = getData(metric, sampling, nAgents);

  if (showDiff) {
    drawDiffPlot(data, metric);
  } else {
    drawPlot(data, metric);
  }
  drawTable(data, metric);
}

function drawPlot(data, metric) {
  const c = document.getElementById('plotCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);

  const padL = 70, padR = 30, padT = 30, padB = 50;
  const pW = W - padL - padR, pH = H - padT - padB;

  // Find y range
  let yMin = Infinity, yMax = -Infinity;
  for (const d of DISCIPLINES) {
    for (const p of data[d]) {
      yMin = Math.min(yMin, p.mean - p.ci);
      yMax = Math.max(yMax, p.mean + p.ci);
    }
  }
  const yPad = (yMax - yMin) * 0.15 || 1;
  yMin -= yPad; yMax += yPad;

  function tx(rho) { return padL + (rho / 1.0) * pW; }
  function ty(v) { return padT + (yMax - v)/(yMax - yMin) * pH; }

  // Grid
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = yMin + (yMax - yMin) * i / 5;
    ctx.beginPath(); ctx.moveTo(padL, ty(y)); ctx.lineTo(W-padR, ty(y)); ctx.stroke();
  }
  for (const rho of RHOS) {
    ctx.beginPath(); ctx.moveTo(tx(rho), padT); ctx.lineTo(tx(rho), H-padB); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, H-padB); ctx.lineTo(W-padR, H-padB); ctx.stroke();

  // Lines + error bars
  for (const d of DISCIPLINES) {
    const pts = data[d];
    if (pts.length === 0) continue;

    // Line
    ctx.strokeStyle = DISC_COLORS[d]; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const x = tx(pts[i].rho), y = ty(pts[i].mean);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Points + error bars
    for (const p of pts) {
      const x = tx(p.rho), y = ty(p.mean);

      // Error bar
      ctx.strokeStyle = DISC_COLORS[d]; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x, ty(p.mean - p.ci)); ctx.lineTo(x, ty(p.mean + p.ci)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-4, ty(p.mean-p.ci)); ctx.lineTo(x+4, ty(p.mean-p.ci)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-4, ty(p.mean+p.ci)); ctx.lineTo(x+4, ty(p.mean+p.ci)); ctx.stroke();

      // Point
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fillStyle = DISC_COLORS[d]; ctx.fill();
    }
  }

  // Legend
  let lx = padL + 10, ly = padT + 10;
  for (const d of DISCIPLINES) {
    ctx.fillStyle = DISC_COLORS[d];
    ctx.fillRect(lx, ly, 14, 10);
    ctx.fillStyle = '#333'; ctx.font = '12px Segoe UI, system-ui, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(d, lx + 18, ly + 9);
    lx += 70;
  }

  // Axis labels
  ctx.fillStyle = '#333'; ctx.font = '12px Segoe UI, system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('\u03C1 (prediction accuracy)', W/2, H-8);
  ctx.save(); ctx.translate(16, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(METRIC_LABELS[metric], 0, 0); ctx.restore();

  // X ticks
  ctx.font = '11px Segoe UI, system-ui, sans-serif'; ctx.textAlign = 'center';
  for (const rho of RHOS) ctx.fillText(rho.toFixed(2), tx(rho), H-padB+16);

  // Y ticks
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const v = yMin + (yMax - yMin) * i / 5;
    ctx.fillText(v.toFixed(2), padL-6, ty(v)+4);
  }
}

function drawDiffPlot(data, metric) {
  const c = document.getElementById('plotCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);

  const padL = 70, padR = 30, padT = 30, padB = 50;
  const pW = W - padL - padR, pH = H - padT - padB;

  // Compute diff
  const diffs = [];
  for (let i = 0; i < data['NPS'].length; i++) {
    const nps = data['NPS'][i];
    const lrtf = data['LRTF'][i];
    diffs.push({ rho: nps.rho, diff: nps.mean - lrtf.mean });
  }

  let yMin = -0.5, yMax = 0.5;
  for (const d of diffs) {
    yMin = Math.min(yMin, d.diff - 0.1);
    yMax = Math.max(yMax, d.diff + 0.1);
  }

  function tx(rho) { return padL + (rho / 1.0) * pW; }
  function ty(v) { return padT + (yMax - v)/(yMax - yMin) * pH; }

  // Grid
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = yMin + (yMax - yMin) * i / 5;
    ctx.beginPath(); ctx.moveTo(padL, ty(y)); ctx.lineTo(W-padR, ty(y)); ctx.stroke();
  }

  // Zero line
  ctx.setLineDash([6,4]); ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(padL, ty(0)); ctx.lineTo(W-padR, ty(0)); ctx.stroke();
  ctx.setLineDash([]);

  // Axes
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, H-padB); ctx.lineTo(W-padR, H-padB); ctx.stroke();

  // Diff line
  ctx.strokeStyle = '#d62728'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i < diffs.length; i++) {
    const x = tx(diffs[i].rho), y = ty(diffs[i].diff);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  for (const d of diffs) {
    ctx.beginPath(); ctx.arc(tx(d.rho), ty(d.diff), 5, 0, Math.PI*2);
    ctx.fillStyle = '#d62728'; ctx.fill();
  }

  // Labels
  ctx.fillStyle = '#333'; ctx.font = '12px Segoe UI, system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('\u03C1 (prediction accuracy)', W/2, H-8);
  ctx.save(); ctx.translate(16, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('NPS \u2212 LRTF forskel', 0, 0); ctx.restore();

  ctx.font = '11px Segoe UI, system-ui, sans-serif'; ctx.textAlign = 'center';
  for (const rho of RHOS) ctx.fillText(rho.toFixed(2), tx(rho), H-padB+16);
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const v = yMin + (yMax - yMin) * i / 5;
    ctx.fillText(v.toFixed(4), padL-6, ty(v)+4);
  }

  // Title
  ctx.fillStyle = '#d62728'; ctx.font = 'bold 13px Segoe UI, system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('NPS \u2212 LRTF forskel (skal v\u00e6re 0)', W/2, padT-8);
}

function drawTable(data, metric) {
  const el = document.getElementById('dataTable');
  let html = '<table><tr><th>\u03C1</th>';
  for (const d of DISCIPLINES) html += `<th style="color:${DISC_COLORS[d]}">${d}</th>`;
  html += '<th>NPS\u2212LRTF</th></tr>';

  for (let i = 0; i < RHOS.length; i++) {
    html += `<tr><td>${RHOS[i].toFixed(2)}</td>`;
    for (const d of DISCIPLINES) {
      const p = data[d][i];
      if (p) {
        html += `<td>${p.mean.toFixed(4)} \u00B1${p.ci.toFixed(4)}</td>`;
      } else {
        html += '<td>-</td>';
      }
    }
    // Diff
    const nps = data['NPS'][i], lrtf = data['LRTF'][i];
    const diff = (nps && lrtf) ? (nps.mean - lrtf.mean).toFixed(4) : '-';
    html += `<td class="diff-row">${diff}</td></tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

update();
</script>
